<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 340 230" style="width:100%;max-width:340px">

  <!-- terminal black -->
  <rect width="340" height="230" fill="#0a0a0a"/>

  <!-- flames: back layer, dark red -->
  <path d="M 92,122 C 68,98 82,68 104,44 C 110,70 124,56 128,28
           C 136,58 150,40 156,18 C 162,46 174,36 178,16
           C 184,48 196,62 202,40 C 200,72 222,90 228,122 Z"
    fill="#991f00"/>

  <!-- flames: mid, orange -->
  <path d="M 102,122 C 84,100 96,74 116,54
           C 122,76 134,62 140,38 C 148,66 160,50 166,28
           C 172,58 182,68 192,50 C 190,80 210,94 216,122 Z"
    fill="#cc4400"/>

  <!-- flames: front, bright orange -->
  <path d="M 115,122 C 100,102 112,80 130,60
           C 136,80 148,68 153,46 C 160,70 170,76 180,58
           C 178,84 194,98 200,122 Z"
    fill="#ff6600"/>

  <!-- flames: tips, yellow -->
  <path d="M 128,122 C 118,104 130,84 143,66
           C 148,84 157,74 162,56 C 167,76 175,84 182,122 Z"
    fill="#ffaa00"/>

  <!-- comic censor burst IN the flames -->
  <polygon
    points="161,44 165,55 174,49 171,60 181,61 173,67 177,78
            168,74 167,85 160,78 153,85 152,74 143,78 147,67
            139,61 149,60 146,49 155,55"
    fill="#FFD700" stroke="#0a0a0a" stroke-width="0.8"/>
  <text x="160" y="68" text-anchor="middle" dominant-baseline="central"
    font-family="'Courier New',Courier,monospace" font-weight="900"
    font-size="8" fill="#0a0a0a">BASH</text>

  <!-- dumpster body -->
  <rect x="80" y="122" width="180" height="88" rx="3"
    fill="#484848" stroke="#2a2a2a" stroke-width="2"/>

  <!-- ribs -->
  <line x1="80" y1="148" x2="260" y2="148" stroke="#383838" stroke-width="1.5"/>
  <line x1="80" y1="172" x2="260" y2="172" stroke="#383838" stroke-width="1.5"/>

  <!-- left lid half — tilted open -->
  <rect x="74" y="113" width="88" height="13" rx="2"
    fill="#555" stroke="#2a2a2a" stroke-width="1.5"
    transform="rotate(-10 74 119)"/>

  <!-- right lid half — tilted other way -->
  <rect x="178" y="111" width="88" height="13" rx="2"
    fill="#555" stroke="#2a2a2a" stroke-width="1.5"
    transform="rotate(6 266 117)"/>

  <!-- #! on dumpster in green — the "label" -->
  <text x="170" y="156" text-anchor="middle"
    font-family="'Courier New',Courier,monospace"
    font-weight="900" font-size="26" fill="#33ff33">#!</text>

  <!-- wheels -->
  <circle cx="114" cy="212" r="10" fill="#2a2a2a" stroke="#1a1a1a" stroke-width="1.5"/>
  <circle cx="114" cy="212" r="4"  fill="#1a1a1a"/>
  <circle cx="226" cy="212" r="10" fill="#2a2a2a" stroke="#1a1a1a" stroke-width="1.5"/>
  <circle cx="226" cy="212" r="4"  fill="#1a1a1a"/>

  <!-- tagline -->
  <text x="170" y="228" text-anchor="middle"
    font-family="'Courier New',Courier,monospace"
    font-size="11" fill="#1a5c1a">it works</text>

</svg>
