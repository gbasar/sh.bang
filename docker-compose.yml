services:

  # ---------- unit tests ----------

  test:
    build:
      context: .
      args:
        HOCON_JAR_URL: ${HOCON_JAR_URL:-}
    entrypoint: bash
    command: tests/run-tests

  # ---------- e2e targets ----------

  target1:
    build:
      context: .
      dockerfile: Dockerfile.server
    hostname: target1
    environment:
      - SSH_PUBKEY

  target2:
    build:
      context: .
      dockerfile: Dockerfile.server
    hostname: target2
    environment:
      - SSH_PUBKEY

  # ---------- e2e runner (Fedora -> Fedora) ----------

  e2e:
    build:
      context: .
      args:
        HOCON_JAR_URL: ${HOCON_JAR_URL:-}
    entrypoint: bash
    command: tests/e2e/run-e2e.sh
    environment:
      - TARGET1=target1
      - TARGET2=target2
      - SSH_PRIVKEY
    depends_on: [target1, target2]
