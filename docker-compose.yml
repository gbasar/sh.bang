services:

  # ---------- unit tests ----------

  test:
    build:
      context: .
      target: client
    entrypoint: bash
    command: tests/run-tests

  # ---------- e2e targets ----------

  target1:
    build:
      context: .
      dockerfile: Dockerfile.server
    hostname: trading-host1
    ports:
      - "2221:22"
      - "5005:5005"   # shard_1 JDWP
      - "5006:5006"   # shard_2 JDWP

  target2:
    build:
      context: .
      dockerfile: Dockerfile.server
    hostname: trading-host2
    ports:
      - "2222:22"
      - "5007:5005"   # shard_3 JDWP (mapped to 5007 to avoid conflict)
      - "5008:5006"   # shard_4 JDWP (mapped to 5008 to avoid conflict)

  # ---------- e2e runner ----------

  e2e:
    build:
      context: .
      target: e2e
    command: tests/e2e/run-e2e.sh
    environment:
      - TARGET1=trading-host1
      - TARGET2=trading-host2
    depends_on: [target1, target2]
