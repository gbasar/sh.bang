# Debug replay — shared team config (shard topology, runtime)
# Used with debug-replay.shbang to reconstruct a prod shard locally for debugging.

runtime {
  javaHome = "/usr/bin/java"
}

trading {
  shard {
    "1" {
      shard = shard_1
      host = trading-host1
      install.directory = /opt/trading
    }
    "2" {
      shard = shard_2
      host = trading-host1
      install.directory = /opt/trading
    }
    "3" {
      shard = shard_3
      host = trading-host2
      install.directory = /opt/trading
    }
    "4" {
      shard = shard_4
      host = trading-host2
      install.directory = /opt/trading
    }
  }
}

# Developer session config (staging host, archive date, breakpoint) — see developerScratchPad.hocon
include "developerScratchPad.hocon"
