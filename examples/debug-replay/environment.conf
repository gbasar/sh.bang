# Debug replay context — jumphost staging environment
# Used with debug-replay.shbang to reconstruct a prod shard locally for debugging.

staging {
  jumphost = "jumphost-1"
  root     = "/home/deploy/staging"
}

archive {
  date = "20260520"   # date tag of the rdat archive to pull (YYYYMMDD)
}

runtime {
  javaHome = "/usr/bin/java"
}

# The breakpoint the developer wants to land on.
# Edit condition to match the specific order/trade you are investigating.
debug {
  class     = OrderEventHandler
  method    = process
  condition = "orderId=ORD-12345"
  jdwpPort  = 5005
}

trading {
  shard {
    "1" {
      shard             = shard_1
      host              = trading-host1
      install.directory = /opt/trading
    }
    "2" {
      shard             = shard_2
      host              = trading-host1
      install.directory = /opt/trading
    }
    "3" {
      shard             = shard_3
      host              = trading-host2
      install.directory = /opt/trading
    }
    "4" {
      shard             = shard_4
      host              = trading-host2
      install.directory = /opt/trading
    }
  }
}
