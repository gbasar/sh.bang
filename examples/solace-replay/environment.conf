// Replay environment config — SIT format (trading2 style)
// 4 shards across 2 hosts, aliased via shard = ${trading.instances}

install {
  directory = /opt/trading
  user = deploy
}

runtime {
  javaHome = /usr/bin/java
}

trading {
  shard = ${trading.instances}

  instances {
    1 {
      host = target1
      install.directory = ${install.directory}"/shard_1"
    }
    2 {
      host = target1
      install.directory = ${install.directory}"/shard_2"
    }
    3 {
      host = target2
      install.directory = ${install.directory}"/shard_3"
    }
    4 {
      host = target2
      install.directory = ${install.directory}"/shard_4"
    }
  }
}
